<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 30px;
            color: #222;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .botao {
            display: inline-block;
            text-decoration: none;
            background: #1f2937;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-weight: bold;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin: 0 0 8px;
        }

        .tipo {
            color: #666;
            margin-bottom: 14px;
        }

        .saldo {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
        }
    </style>
</head>
<body>
    <div class="topo">
        <h1>Contas</h1>
        <a href="/" class="botao">Voltar ao Dashboard</a>
    </div>

    <div class="cards">
        {% for conta in contas %}
        <div class="card">
            <h2>{{ conta.nome }}</h2>
            <div class="tipo">{{ conta.get_tipo_display }}</div>
            <div class="saldo">R$ {{ conta.saldo_inicial }}</div>
        </div>
        {% empty %}
        <p>Nenhuma conta cadastrada.</p>
        {% endfor %}
    </div>
</body>
</html>
