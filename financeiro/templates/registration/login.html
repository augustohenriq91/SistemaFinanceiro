{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Sistema Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'financeiro/styles.css' %}">
</head>
<body class="auth-body">
    <main class="auth-card">
        <div class="brand-block">
            <div class="brand-mark">FP</div>
            <div>
                <div class="brand">Financeiro Pessoal</div>
                <div class="brand-subtitle">Entre para acessar seus dados</div>
            </div>
        </div>

        {% if form.errors %}
            <div class="alert-danger">Usuario ou senha invalidos. Tente novamente.</div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <p>
                <label for="{{ form.username.id_for_label }}">Usuario</label>
                {{ form.username }}
            </p>

            <p>
                <label for="{{ form.password.id_for_label }}">Senha</label>
                {{ form.password }}
            </p>

            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </main>
</body>
</html>
